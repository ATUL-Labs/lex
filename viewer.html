<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ctx viewer</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --bg: #07090d;
    --panel: #0d1117;
    --panel-border: #1c2530;
    --ink: #d7e2ec;
    --dim: #6b7a89;
    --accent: #4de3ff;
    --accent-2: #8b5cf6;
    --good: #3ddc84;
    --warn: #ffb454;
    --mono: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace;
    --sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 0%, rgba(77,227,255,0.06), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(139,92,246,0.05), transparent 45%);
  }
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 22px;
    border-bottom: 1px solid var(--panel-border);
    background: rgba(13,17,23,0.7);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(6px);
  }
  .wordmark {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .project-name {
    font-size: 14px;
    color: var(--ink);
    font-weight: 600;
  }
  .live-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .live-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--good);
    box-shadow: 0 0 12px rgba(61,220,132,0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  .live-dot.stale {
    background: var(--warn);
    box-shadow: 0 0 12px rgba(255,180,84,0.4);
    animation: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .live-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--dim);
    transition: color 150ms ease, text-shadow 150ms ease;
  }
  .live-label.tick {
    color: var(--good);
    text-shadow: 0 0 8px rgba(61,220,132,0.5);
  }
  .version {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    padding-left: 12px;
    border-left: 1px solid var(--panel-border);
  }
  .freshness {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--dim);
    padding-left: 12px;
    border-left: 1px solid var(--panel-border);
  }

  .grid {
    display: grid;
    grid-template-columns: 38% 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
    padding: 20px;
    max-width: 1600px;
    margin: 0 auto;
  }
  @media (max-width: 1099px) {
    .grid { grid-template-columns: 1fr; }
  }
  .panel-now { grid-column: 1; grid-row: 1 / 3; }
  .panel-codebase { grid-column: 2; grid-row: 1; }
  .panel-graph { grid-column: 2; grid-row: 2; }
  .panel-memory { grid-column: 1 / 3; grid-row: 3; }
  @media (max-width: 1099px) {
    .panel-now, .panel-codebase, .panel-graph, .panel-memory {
      grid-column: 1;
      grid-row: auto;
    }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 16px 18px;
    min-width: 0;
  }
  .panel h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
    margin: 0 0 12px 0;
    font-weight: 600;
  }
  .panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
    margin: 18px 0 8px 0;
    font-weight: 600;
  }

  .fade-up {
    animation: fadeUp 350ms cubic-bezier(0.16,1,0.3,1) both;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .status-grid {
    display: grid;
    grid-template-columns: max-content 1fr;
    gap: 4px 12px;
    font-family: var(--mono);
    font-size: 12.5px;
  }
  .status-grid dt { color: var(--accent); white-space: nowrap; }
  .status-grid dd { margin: 0; color: var(--ink); word-break: break-word; }
  .status-plain {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink);
    white-space: pre-wrap;
    line-height: 1.5;
    margin: 2px 0;
  }
  .empty-state {
    color: var(--dim);
    font-family: var(--mono);
    font-size: 12.5px;
    font-style: normal;
    padding: 8px 0;
  }

  /* ---- markdown renderer ---- */
  .md h1, .md h2, .md h3 { font-family: var(--sans); font-weight: 600; color: var(--ink); margin: 14px 0 6px 0; }
  .md h1 { font-size: 16px; }
  .md h2 { font-size: 14px; }
  .md h3 { font-size: 12.5px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
  .md p { font-family: var(--mono); font-size: 12.5px; color: var(--ink); line-height: 1.5; margin: 4px 0; white-space: pre-wrap; }
  .md ul, .md ol { margin: 4px 0; padding-left: 20px; font-family: var(--mono); font-size: 12.5px; color: var(--ink); }
  .md li { padding: 2px 0; line-height: 1.45; }
  .md li ul, .md li ol { margin: 2px 0; }
  .md code { font-family: var(--mono); background: rgba(28,37,48,0.6); border: 1px solid var(--panel-border); border-radius: 3px; padding: 0 4px; font-size: 11.5px; }
  .md pre { font-family: var(--mono); font-size: 11.5px; color: var(--ink); background: rgba(28,37,48,0.4); border: 1px solid var(--panel-border); border-radius: 6px; padding: 10px 12px; overflow-x: auto; margin: 6px 0; white-space: pre; }
  .md pre code { background: none; border: none; padding: 0; }
  .md .md-frontmatter { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 0 10px 0; }
  .md .md-chip { font-family: var(--mono); font-size: 10.5px; color: var(--dim); background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); border-radius: 20px; padding: 2px 9px; }

  .wip-progress { margin-bottom: 10px; }
  .wip-progress-label { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-bottom: 5px; }
  .wip-progress-track { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
  .wip-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 200ms ease; }

  .wip-list { list-style: none; margin: 0; padding: 0; }
  .wip-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    font-family: var(--mono);
    font-size: 12.5px;
  }
  .wip-box {
    flex: none;
    width: 12px;
    height: 12px;
    margin-top: 2px;
    border: 1.5px solid var(--accent);
    border-radius: 3px;
  }
  .wip-box.checked {
    background: var(--dim);
    border-color: var(--dim);
  }
  .wip-text.done {
    color: var(--dim);
    text-decoration: line-through;
  }
  .wip-plain {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--dim);
    padding: 3px 0;
  }

  .stat-tiles {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .tile {
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.015);
  }
  .tile .num {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--accent);
    font-weight: 600;
  }
  .tile .lbl {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
    margin-top: 2px;
  }

  .search-box {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 7px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 12.5px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 150ms ease;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-results { margin-top: 10px; }
  .search-row { padding: 7px 0; border-bottom: 1px solid var(--panel-border); }
  .search-row:last-child { border-bottom: none; }
  .search-path { font-family: var(--mono); font-size: 11.5px; color: var(--accent); }
  .search-snip { font-family: var(--mono); font-size: 11.5px; color: var(--dim); margin-top: 2px; line-height: 1.4; }
  .search-snip mark { background: rgba(77,227,255,0.18); color: var(--accent); padding: 0 2px; border-radius: 2px; }

  .graph-empty { color: var(--dim); font-family: var(--mono); font-size: 12.5px; padding: 20px 0; text-align: center; }

  .graph-filter { width: 100%; margin-bottom: 10px; }
  .graph-body { max-height: 360px; overflow-y: auto; }
  .graph-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1px solid var(--panel-border);
    position: relative;
  }
  .graph-row:last-child { border-bottom: none; }
  .graph-row.dimmed { opacity: 0.6; }
  .graph-row.matched { box-shadow: inset 0 -2px 0 0 rgba(77,227,255,0.35); }
  .graph-methods { display: flex; gap: 3px; flex: none; }
  .method-chip {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 6px;
    border-radius: 20px;
    line-height: 1.6;
    color: var(--bg);
    font-weight: 700;
  }
  .method-get { background: var(--good); }
  .method-post { background: var(--accent-2); color: var(--ink); }
  .method-patch, .method-put { background: var(--warn); }
  .method-delete { background: #ff6b6b; }
  .method-other { background: var(--dim); }
  .graph-url {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .graph-refs { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; flex: none; }
  .graph-ref { font-family: var(--mono); font-size: 10.5px; white-space: nowrap; }
  .graph-ref.ref-route { color: var(--accent); }
  .graph-ref.ref-consumer { color: var(--accent-2); }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid var(--panel-border); }
  .tab-btn {
    background: transparent;
    border: none;
    color: var(--dim);
    font-family: var(--sans);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-btn:hover { color: var(--ink); }

  .mem-layout { display: grid; grid-template-columns: 220px 1fr; gap: 16px; min-height: 220px; }
  @media (max-width: 700px) { .mem-layout { grid-template-columns: 1fr; } }
  .mem-list { list-style: none; margin: 0; padding: 0; }
  .mem-list li {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    padding: 7px 8px;
    border-radius: 5px;
    cursor: pointer;
  }
  .mem-list li:hover { background: rgba(77,227,255,0.06); }
  .mem-list li.active { background: rgba(77,227,255,0.1); color: var(--accent); }
  .mem-list li.static-item { cursor: default; }
  .mem-list li.static-item:hover { background: transparent; }
  .mem-pre {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    max-height: 320px;
    overflow-y: auto;
    line-height: 1.5;
  }
  .audit-line { font-family: var(--mono); font-size: 11.5px; padding: 4px 0; border-bottom: 1px solid var(--panel-border); }
  .audit-line span { margin-right: 4px; }
  .audit-line .f-time { color: var(--dim); }
  .audit-line .f-agent { color: var(--accent-2); }
  .audit-line .f-plat { color: var(--dim); }
  .audit-line .f-action { color: var(--accent); }
  .audit-line .f-rest { color: var(--ink); }

  .timeline-body { max-height: 360px; overflow-y: auto; }
  .timeline-date { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin: 14px 0 6px 0; }
  .timeline-date:first-child { margin-top: 0; }
  .timeline-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 5px 4px;
    border-bottom: 1px solid var(--panel-border);
    font-family: var(--mono);
    font-size: 12px;
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-time { color: var(--dim); flex: none; font-size: 11px; }
  .timeline-agent {
    flex: none;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent-2);
    background: rgba(139,92,246,0.12);
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 20px;
    padding: 1px 7px;
  }
  .timeline-action { color: var(--accent); flex: none; }
  .timeline-target { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .timeline-row.flash { animation: flashNew 600ms ease-out 1; }
  @keyframes flashNew {
    from { background: rgba(77,227,255,0.22); }
    to { background: transparent; }
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 4px; }

  .search-row-btn { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 0; cursor: pointer; color: inherit; font: inherit; }
  .search-row-btn:hover .search-path { text-decoration: underline; }

  .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 250ms ease-out; }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 46%; min-width: 480px;
    background: var(--panel); border-left: 1px solid var(--panel-border); z-index: 101;
    transform: translateX(100%); transition: transform 250ms ease-out;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  @media (max-width: 900px) { .drawer { width: 100%; min-width: 0; } }

  .drawer-header { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--panel-border); }
  .drawer-path { font-family: var(--mono); font-size: 12.5px; color: var(--accent); word-break: break-all; flex: 1; }
  .drawer-close { background: transparent; border: 1px solid var(--panel-border); color: var(--dim); border-radius: 6px; width: 26px; height: 26px; line-height: 1; cursor: pointer; font-size: 14px; flex: none; }
  .drawer-close:hover { color: var(--ink); border-color: var(--accent); }

  .drawer-body { display: grid; grid-template-columns: 200px 1fr; flex: 1; min-height: 0; overflow: hidden; }
  .drawer-outline { border-right: 1px solid var(--panel-border); overflow-y: auto; padding: 10px; }
  .drawer-outline-item { display: block; width: 100%; text-align: left; background: transparent; border: none; color: var(--dim); font-family: var(--mono); font-size: 11px; padding: 4px 6px; border-radius: 4px; cursor: pointer; }
  .drawer-outline-item:hover { color: var(--ink); background: rgba(255,255,255,0.04); }
  .drawer-outline-item .kind { color: var(--accent-2); margin-right: 4px; }

  .drawer-code { overflow: auto; margin: 0; padding: 10px 0; font-family: var(--mono); font-size: 11.5px; line-height: 1.6; color: var(--ink); }
  .drawer-code li { padding: 0 14px; white-space: pre-wrap; word-break: break-word; border-left: 3px solid transparent; }
  .drawer-code li.hit { border-left-color: var(--accent); background: rgba(77,227,255,0.07); }
  .drawer-code li::marker { color: var(--dim); font-size: 10.5px; }
</style>
</head>
<body>

<header>
  <span class="wordmark">ctx</span>
  <span class="project-name" id="project-name">-</span>
  <div class="live-group">
    <div class="live-dot" id="live-dot" title="live"></div>
    <span class="live-label" id="live-label">live</span>
  </div>
  <span class="freshness" id="freshness"></span>
  <span class="version" id="version">v0.0.0</span>
</header>

<main class="grid">
  <section class="panel panel-now fade-up" style="animation-delay:0ms">
    <h2>Now</h2>
    <div id="status-content"><div class="empty-state">loading...</div></div>
    <h3>WIP</h3>
    <div id="wip-content"><div class="empty-state">loading...</div></div>
  </section>

  <section class="panel panel-codebase fade-up" style="animation-delay:50ms">
    <h2>Codebase</h2>
    <div class="stat-tiles">
      <div class="tile"><div class="num" id="stat-files">0</div><div class="lbl">Files</div></div>
      <div class="tile"><div class="num" id="stat-symbols">0</div><div class="lbl">Symbols</div></div>
      <div class="tile"><div class="num" id="stat-links">0</div><div class="lbl">Links</div></div>
    </div>
    <input class="search-box" id="search-input" type="text" placeholder="search codebase and pages...">
    <div class="search-results" id="search-results"></div>
  </section>

  <section class="panel panel-graph fade-up" style="animation-delay:100ms">
    <h2>Graph</h2>
    <input class="search-box graph-filter" id="graph-filter" type="text" placeholder="filter by url...">
    <div id="graph-content"><div class="graph-empty">no API links indexed</div></div>
  </section>

  <section class="panel panel-memory fade-up" style="animation-delay:150ms">
    <h2>Memory</h2>
    <div class="tabs">
      <button class="tab-btn active" data-tab="pages">Pages</button>
      <button class="tab-btn" data-tab="sessions">Sessions</button>
      <button class="tab-btn" data-tab="activity">Activity</button>
    </div>
    <div class="mem-layout" id="mem-pages">
      <ul class="mem-list" id="pages-list"></ul>
      <div class="mem-pre md" id="pages-content"><div class="empty-state">select a page</div></div>
    </div>
    <div class="mem-layout" id="mem-sessions" style="display:none">
      <ul class="mem-list" id="sessions-list"></ul>
      <div class="mem-pre md" id="sessions-content"><div class="empty-state">select a session</div></div>
    </div>
    <div id="mem-activity" style="display:none">
      <div class="timeline-body" id="activity-list"></div>
    </div>
  </section>
</main>

<div class="drawer-backdrop" id="drawer-backdrop"></div>
<div class="drawer" id="drawer" role="dialog" aria-label="file preview">
  <div class="drawer-header">
    <div class="drawer-path" id="drawer-path"></div>
    <button class="drawer-close" id="drawer-close" type="button" aria-label="close">&times;</button>
  </div>
  <div class="drawer-body">
    <div class="drawer-outline" id="drawer-outline"></div>
    <ol class="drawer-code" id="drawer-code"></ol>
  </div>
</div>

<script>
'use strict';

var state = {
  overview: null,
  serialized: { status: '', wip: '', pages: '', sessions: '', audit: '', index: '' },
  activePage: null,
  linksFetchedAt: 0,
  pollFailed: false,
  refreshedAt: null,
  graphRows: [],
  seenActivityKeys: null,
};

function qs(id) { return document.getElementById(id); }

function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

function textEl(tag, text, className) {
  var el = document.createElement(tag);
  if (className) el.className = className;
  if (text !== undefined && text !== null) el.textContent = text;
  return el;
}

// ---------- markdown renderer ----------
// renderMarkdown(text) -> DocumentFragment. DOM-node building only, no innerHTML.
var KV_RE = /^(\w[\w-]*):\s*(.*)$/;
var HEADING_RE = /^(#{1,3})\s+(.*)$/;
var LIST_RE = /^(\s*)(?:[-*]|(\d+)\.)\s+(.*)$/;
var CHECKBOX_RE = /^\s*(?:[-*]|\d+\.)\s*\[([ xX])\]\s*(.*)$/;
var FENCE_RE = /^```/;

function appendInline(parent, text) {
  // split-based inline parsing: alternate on ** (bold) and ` (code) markers
  var boldParts = text.split('**');
  boldParts.forEach(function (part, i) {
    var isBold = i % 2 === 1;
    var codeParts = part.split('`');
    codeParts.forEach(function (seg, j) {
      var isCode = j % 2 === 1;
      if (seg === '') return;
      if (isCode) {
        var codeEl = document.createElement('code');
        codeEl.textContent = seg;
        parent.appendChild(codeEl);
      } else if (isBold) {
        var b = document.createElement('b');
        b.textContent = seg;
        parent.appendChild(b);
      } else {
        parent.appendChild(document.createTextNode(seg));
      }
    });
  });
}

function renderMarkdown(text) {
  var frag = document.createDocumentFragment();
  if (!text) return frag;

  var lines = text.split('\n');
  var i = 0;

  // frontmatter: --- delimited block at top
  if (lines[0] === '---') {
    var end = -1;
    for (var f = 1; f < lines.length; f++) {
      if (lines[f] === '---') { end = f; break; }
    }
    if (end !== -1) {
      var chipRow = textEl('div', null, 'md-frontmatter');
      for (var f2 = 1; f2 < end; f2++) {
        var fm = lines[f2].match(KV_RE);
        if (fm) {
          chipRow.appendChild(textEl('span', fm[1] + ': ' + fm[2], 'md-chip'));
        } else if (lines[f2].trim() !== '') {
          chipRow.appendChild(textEl('span', lines[f2].trim(), 'md-chip'));
        }
      }
      if (chipRow.firstChild) frag.appendChild(chipRow);
      i = end + 1;
    }
  }

  var checkboxCount = 0;
  var checkedCount = 0;

  function countCheckboxes(from) {
    for (var k = from; k < lines.length; k++) {
      if (CHECKBOX_RE.test(lines[k])) checkboxCount++;
    }
  }

  function makeList(ordered) {
    return textEl(ordered ? 'ol' : 'ul');
  }

  while (i < lines.length) {
    var line = lines[i];

    if (line.trim() === '') { i++; continue; }

    // fenced code block
    if (FENCE_RE.test(line)) {
      var codeLines = [];
      i++;
      while (i < lines.length && !FENCE_RE.test(lines[i])) {
        codeLines.push(lines[i]);
        i++;
      }
      i++; // skip closing fence
      var pre = document.createElement('pre');
      var codeEl2 = document.createElement('code');
      codeEl2.textContent = codeLines.join('\n');
      pre.appendChild(codeEl2);
      frag.appendChild(pre);
      continue;
    }

    // heading
    var hm = line.match(HEADING_RE);
    if (hm) {
      var hEl = document.createElement('h' + hm[1].length);
      appendInline(hEl, hm[2]);
      frag.appendChild(hEl);
      i++;
      continue;
    }

    // checkbox list run
    if (CHECKBOX_RE.test(line)) {
      var wl = textEl('ul', null, 'wip-list');
      while (i < lines.length && CHECKBOX_RE.test(lines[i])) {
        var cm = lines[i].match(CHECKBOX_RE);
        var done = cm[1].toLowerCase() === 'x';
        checkboxCount++;
        if (done) checkedCount++;
        var li = textEl('li', null, 'wip-item');
        var box = textEl('span', null, 'wip-box' + (done ? ' checked' : ''));
        var txt = textEl('span', null, 'wip-text' + (done ? ' done' : ''));
        appendInline(txt, cm[2]);
        li.appendChild(box);
        li.appendChild(txt);
        wl.appendChild(li);
        i++;
      }
      frag.appendChild(wl);
      continue;
    }

    // list run (bullets / numbered, one level of 2-space nesting)
    if (LIST_RE.test(line)) {
      var listRoot = null;
      var nestedList = null;
      var rootOrdered = null;
      while (i < lines.length && LIST_RE.test(lines[i]) && lines[i].trim() !== '') {
        var lm = lines[i].match(LIST_RE);
        var indent = lm[1].length;
        var ordered = !!lm[2];
        if (!listRoot) {
          rootOrdered = ordered;
          listRoot = makeList(rootOrdered);
          frag.appendChild(listRoot);
        }
        if (indent >= 2) {
          if (!nestedList) {
            nestedList = makeList(ordered);
            var lastLi = listRoot.lastElementChild;
            if (lastLi) lastLi.appendChild(nestedList);
            else listRoot.appendChild(nestedList);
          }
          var nli = textEl('li');
          appendInline(nli, lm[3]);
          nestedList.appendChild(nli);
        } else {
          nestedList = null;
          var rli = textEl('li');
          appendInline(rli, lm[3]);
          listRoot.appendChild(rli);
        }
        i++;
      }
      continue;
    }

    // key: value runs of 3+ -> definition grid
    if (KV_RE.test(line)) {
      var kvLines = [];
      var j = i;
      while (j < lines.length && KV_RE.test(lines[j]) && lines[j].trim() !== '') {
        kvLines.push(lines[j]);
        j++;
      }
      if (kvLines.length >= 3) {
        var dl = textEl('dl', null, 'status-grid');
        kvLines.forEach(function (kvLine) {
          var m = kvLine.match(KV_RE);
          dl.appendChild(textEl('dt', m[1]));
          var dd = textEl('dd');
          appendInline(dd, m[2]);
          dl.appendChild(dd);
        });
        frag.appendChild(dl);
        i = j;
        continue;
      }
    }

    // paragraph: accumulate until blank line or a line starting a new block
    var paraLines = [line];
    i++;
    while (
      i < lines.length &&
      lines[i].trim() !== '' &&
      !HEADING_RE.test(lines[i]) &&
      !FENCE_RE.test(lines[i]) &&
      !LIST_RE.test(lines[i]) &&
      !CHECKBOX_RE.test(lines[i])
    ) {
      paraLines.push(lines[i]);
      i++;
    }
    var p = document.createElement('p');
    appendInline(p, paraLines.join('\n'));
    frag.appendChild(p);
  }

  return frag;
}

// ---------- status.md rendering ----------
function renderStatus(status) {
  var host = qs('status-content');
  clear(host);
  if (!status) {

// ---------- wip.md rendering ----------
var WIP_RE = /^\s*(?:[-*]|\d+\.)\s*\[([ xX])\]\s*(.*)$/;

function renderWip(wip) {
  var host = qs('wip-content');
  clear(host);
  if (!wip) {
    host.appendChild(textEl('div', 'no active work', 'empty-state'));
    return;
  }
  var lines = wip.split('\n').filter(function (l) { return l.trim() !== ''; });
  if (!lines.length) {
    host.appendChild(textEl('div', 'no active work', 'empty-state'));
    return;
  }
  var list = textEl('ul', null, 'wip-list');
  var any = false;
  var total = 0;
  var done = 0;
  lines.forEach(function (line) {
    var m = line.match(WIP_RE);
    if (m) {
      any = true;
      total++;
      var isDone = m[1].toLowerCase() === 'x';
      if (isDone) done++;
      var li = textEl('li', null, 'wip-item');
      var box = textEl('span', null, 'wip-box' + (isDone ? ' checked' : ''));
      var txt = textEl('span', m[2], 'wip-text' + (isDone ? ' done' : ''));
      li.appendChild(box);
      li.appendChild(txt);
      list.appendChild(li);
    } else if (!/^#/.test(line.trim())) {
      any = true;
      list.appendChild(textEl('li', line, 'wip-plain'));
    }
  });
  if (!any) {
    host.appendChild(textEl('div', 'no active work', 'empty-state'));
  } else {
    if (total > 0) {
      var pct = Math.round((done / total) * 100);
      var progress = textEl('div', null, 'wip-progress');
      progress.appendChild(textEl('div', done + ' of ' + total + ' done', 'wip-progress-label'));
      var track = textEl('div', null, 'wip-progress-track');
      var fill = textEl('div', null, 'wip-progress-fill');
      fill.style.width = pct + '%';
      track.appendChild(fill);
      progress.appendChild(track);
      host.appendChild(progress);
    }
    host.appendChild(list);
  }
}

// ---------- search ----------
function renderSearchRows(rows) {
  var host = qs('search-results');
  clear(host);
  if (!rows.length) return;
  rows.forEach(function (row) {
    var rowEl = textEl('div', null, 'search-row');
    var btn = textEl('button', null, 'search-row-btn');
    btn.type = 'button';
    btn.appendChild(textEl('div', row.path, 'search-path'));
    var snipEl = textEl('div', null, 'search-snip');
    buildSnippet(snipEl, row.snip);
    btn.appendChild(snipEl);
    btn.addEventListener('click', function () { openDrawer(row.path); });
    rowEl.appendChild(btn);
    host.appendChild(rowEl);
  });
}

function buildSnippet(container, snip) {
  var parts = snip.split('[[');
  container.appendChild(document.createTextNode(parts[0]));
  for (var i = 1; i < parts.length; i++) {
    var closeIdx = parts[i].indexOf(']]');
    if (closeIdx === -1) {
      container.appendChild(document.createTextNode(parts[i]));
      continue;
    }
    var marked = parts[i].slice(0, closeIdx);
    var rest = parts[i].slice(closeIdx + 2);
    var mark = document.createElement('mark');
    mark.textContent = marked;
    container.appendChild(mark);
    container.appendChild(document.createTextNode(rest));
  }
}

var searchTimer = null;
qs('search-input').addEventListener('input', function (e) {
  var q = e.target.value.trim();
  clearTimeout(searchTimer);
  if (!q) { clear(qs('search-results')); return; }
  searchTimer = setTimeout(function () { runSearch(q); }, 300);
});

function runSearch(q) {
  fetch('/api/search?q=' + encodeURIComponent(q))
    .then(function (r) { return r.json(); })
    .then(function (data) { renderSearchRows(data.rows || []); })
    .catch(function () {});
}

// ---------- links graph (v2: grouped rows) ----------
function methodClass(method) {
  var m = (method || '').toUpperCase();
  if (m === 'GET') return 'method-get';
  if (m === 'POST') return 'method-post';
  if (m === 'PATCH') return 'method-patch';
  if (m === 'PUT') return 'method-put';
  if (m === 'DELETE') return 'method-delete';
  return 'method-other';
}

function refLabel(entry) {
  return entry.path + ':' + entry.line;
}

function buildGraphGroups(rows) {
  var byUrl = {};
  rows.forEach(function (r) {
    if (!byUrl[r.url]) byUrl[r.url] = { url: r.url, routes: [], consumers: [] };
    if (r.side === 'route') byUrl[r.url].routes.push(r);
    else byUrl[r.url].consumers.push(r);
  });
  var matched = [], routeOnly = [], consumerOnly = [];
  Object.keys(byUrl).sort().forEach(function (url) {
    var entry = byUrl[url];
    var hasRoute = entry.routes.length > 0;
    var hasConsumer = entry.consumers.length > 0;
    if (hasRoute && hasConsumer) matched.push(entry);
    else if (hasRoute) routeOnly.push(entry);
    else consumerOnly.push(entry);
  });
  return matched.concat(routeOnly, consumerOnly);
}

function renderGraphRow(entry) {
  var hasRoute = entry.routes.length > 0;
  var hasConsumer = entry.consumers.length > 0;
  var matchedRow = hasRoute && hasConsumer;
  var row = textEl('div', null, 'graph-row' + (matchedRow ? ' matched' : '') + (!hasRoute && hasConsumer ? ' dimmed' : ''));

  var methods = textEl('div', null, 'graph-methods');
  var seen = {};
  entry.routes.concat(entry.consumers).forEach(function (r) {
    var m = (r.method || '').toUpperCase();
    if (!m || seen[m]) return;
    seen[m] = true;
    methods.appendChild(textEl('span', m, 'method-chip ' + methodClass(m)));
  });
  row.appendChild(methods);

  row.appendChild(textEl('div', entry.url, 'graph-url'));

  var refs = textEl('div', null, 'graph-refs');
  entry.routes.forEach(function (r) {
    refs.appendChild(textEl('div', refLabel(r), 'graph-ref ref-route'));
  });
  entry.consumers.forEach(function (r) {
    refs.appendChild(textEl('div', refLabel(r), 'graph-ref ref-consumer'));
  });
  row.appendChild(refs);

  return row;
}

function renderGraph(rows, filterQuery) {
  var host = qs('graph-content');
  clear(host);
  if (!rows.length) {
    host.appendChild(textEl('div', 'no API links indexed', 'graph-empty'));
    return;
  }
  var groups = buildGraphGroups(rows);
  var q = (filterQuery || '').trim().toLowerCase();
  if (q) {
    groups = groups.filter(function (g) { return g.url.toLowerCase().indexOf(q) !== -1; });
  }
  if (!groups.length) {
    host.appendChild(textEl('div', 'no matching links', 'graph-empty'));
    return;
  }
  var capped = groups.slice(0, 40);
  var overflow = groups.length - capped.length;

  var body = textEl('div', null, 'graph-body');
  capped.forEach(function (entry) { body.appendChild(renderGraphRow(entry)); });
  host.appendChild(body);

  if (overflow > 0) {
    host.appendChild(textEl('div', '+' + overflow + ' more', 'empty-state'));
  }
}

qs('graph-filter').addEventListener('input', function (e) {
  renderGraph(state.graphRows, e.target.value);
});

function fetchLinks(force) {
  var now = Date.now();
  if (!force && now - state.linksFetchedAt < 60000) return;
  state.linksFetchedAt = now;
  fetch('/api/links')
    .then(function (r) { if (!r.ok) throw new Error('bad status'); return r.json(); })
    .then(function (data) {
      state.graphRows = data.rows || [];
      renderGraph(state.graphRows, qs('graph-filter').value);
    })
    .catch(function () {});
}

// ---------- activity timeline ----------
function parseActivityLine(line) {
  var parts = line.split(' | ');
  if (parts.length < 4) return null;
  var time = parts[0].trim();
  var dateMatch = time.match(/^(\d{4}-\d{2}-\d{2})/);
  return {
    key: line,
    time: time,
    date: dateMatch ? dateMatch[1] : 'unknown',
    agent: parts[1].trim(),
    platform: parts[2].trim(),
    action: parts[3].trim(),
    target: parts.length > 4 ? parts.slice(4).join(' | ').trim() : '',
  };
}

function renderActivity(lines) {
  var host = qs('activity-list');
  clear(host);
  if (!lines.length) {
    host.appendChild(textEl('div', 'no activity recorded', 'empty-state'));
    return;
  }
  var entries = lines.map(parseActivityLine).filter(Boolean).slice().reverse();
  if (!entries.length) {
    host.appendChild(textEl('div', 'no activity recorded', 'empty-state'));
    return;
  }

  var isFirstPoll = state.seenActivityKeys === null;
  var prevKeys = state.seenActivityKeys || {};
  var nextKeys = {};

  var lastDate = null;
  entries.forEach(function (entry) {
    if (entry.date !== lastDate) {
      lastDate = entry.date;
      host.appendChild(textEl('div', entry.date, 'timeline-date'));
    }
    var isNew = !isFirstPoll && !prevKeys[entry.key];
    nextKeys[entry.key] = true;
    var row = textEl('div', null, 'timeline-row' + (isNew ? ' flash' : ''));
    row.appendChild(textEl('span', entry.time, 'timeline-time'));
    row.appendChild(textEl('span', entry.agent, 'timeline-agent'));
    row.appendChild(textEl('span', entry.action, 'timeline-action'));
    row.appendChild(textEl('span', entry.target, 'timeline-target'));
    host.appendChild(row);
  });

  state.seenActivityKeys = nextKeys;
}

// ---------- codebase explorer drawer ----------
var drawerEl = qs('drawer');
var drawerBackdrop = qs('drawer-backdrop');
var drawerState = { terms: [] };

function currentSearchTerms() {
  var q = qs('search-input').value.trim();
  if (!q) return [];
  return q.split(/\s+/).filter(Boolean).map(function (t) { return t.toLowerCase(); });
}

function lineHasTerm(line, terms) {
  var lower = line.toLowerCase();
  for (var i = 0; i < terms.length; i++) {
    if (terms[i] && lower.indexOf(terms[i]) !== -1) return true;
  }
  return false;
}

function openDrawer(filePath) {
  drawerState.terms = currentSearchTerms();
  qs('drawer-path').textContent = filePath;
  var codeHost = qs('drawer-code');
  var outlineHost = qs('drawer-outline');
  clear(codeHost);
  clear(outlineHost);
  codeHost.appendChild(textEl('li', 'loading...'));

  drawerEl.classList.add('open');
  drawerBackdrop.classList.add('open');

  fetch('/api/file?path=' + encodeURIComponent(filePath))
    .then(function (r) { if (!r.ok) throw new Error('bad status'); return r.json(); })
    .then(function (data) {
      renderDrawerCode(data.text || '');
    })
    .catch(function () {
      clear(codeHost);
      codeHost.appendChild(textEl('li', 'failed to load file'));
    });

  fetch('/api/symbols?path=' + encodeURIComponent(filePath))
    .then(function (r) { if (!r.ok) throw new Error('bad status'); return r.json(); })
    .then(function (data) { renderDrawerOutline(data.rows || []); })
    .catch(function () {
      clear(outlineHost);
      outlineHost.appendChild(textEl('div', 'failed to load symbols', 'empty-state'));
    });
}

function renderDrawerCode(text) {
  var host = qs('drawer-code');
  clear(host);
  var lines = text.split('\n');
  var firstHit = null;
  lines.forEach(function (line) {
    var li = document.createElement('li');
    li.textContent = line;
    if (drawerState.terms.length && lineHasTerm(line, drawerState.terms)) {
      li.classList.add('hit');
      if (!firstHit) firstHit = li;
    }
    host.appendChild(li);
  });
  if (firstHit) {
    firstHit.scrollIntoView({ block: 'center' });
  }
}

function renderDrawerOutline(rows) {
  var host = qs('drawer-outline');
  clear(host);
  if (!rows.length) {
    host.appendChild(textEl('div', 'no symbols', 'empty-state'));
    return;
  }
  rows.forEach(function (row) {
    var btn = textEl('button', null, 'drawer-outline-item');
    btn.type = 'button';
    btn.appendChild(textEl('span', row.kind, 'kind'));
    btn.appendChild(document.createTextNode(row.name));
    btn.addEventListener('click', function () { jumpToLine(row.line); });
    host.appendChild(btn);
  });
}

function jumpToLine(lineNo) {
  var host = qs('drawer-code');
  var li = host.children[lineNo - 1];
  if (li) li.scrollIntoView({ block: 'center' });
}

function closeDrawer() {
  drawerEl.classList.remove('open');
  drawerBackdrop.classList.remove('open');
}

qs('drawer-close').addEventListener('click', closeDrawer);
drawerBackdrop.addEventListener('click', closeDrawer);

document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    closeDrawer();
    return;
  }
  if (e.key === '/') {
    var target = e.target;
    var tag = target && target.tagName ? target.tagName.toLowerCase() : '';
    if (tag === 'input' || tag === 'textarea') return;
    e.preventDefault();
    qs('search-input').focus();
  }
});

// ---------- polling / diffing ----------
function fetchOverview() {
  fetch('/api/overview')
    .then(function (r) {
      if (!r.ok) throw new Error('bad status');
      return r.json();
    })
    .then(function (data) {
      state.pollFailed = false;
      setLiveState(true);
      applyOverview(data);
      tickLiveLabel();
      renderFreshness();
    })
    .catch(function () {
      state.pollFailed = true;
      setLiveState(false);
    });
}

function setLiveState(ok) {
  var dot = qs('live-dot');
  if (ok) {
    dot.classList.remove('stale');
    dot.title = 'live';
  } else {
    dot.classList.add('stale');
    dot.title = 'stale';
  }
}

function applyOverview(data) {
  qs('project-name').textContent = data.project || '-';
  qs('version').textContent = 'v' + (data.version || '0.0.0');

  var s = JSON.stringify(data.status);
  if (s !== state.serialized.status) {
    state.serialized.status = s;
    renderStatus(data.status);
  }

  var w = JSON.stringify(data.wip);
  if (w !== state.serialized.wip) {
    state.serialized.wip = w;
    renderWip(data.wip);
  }

  var idx = JSON.stringify(data.index);
  if (idx !== state.serialized.index) {
    state.serialized.index = idx;
    renderIndex(data.index);
  }

  var p = JSON.stringify(data.pages);
  if (p !== state.serialized.pages) {
    state.serialized.pages = p;
    renderPagesList(data.pages || []);
  }

  var sess = JSON.stringify(data.sessions);
  if (sess !== state.serialized.sessions) {
    state.serialized.sessions = sess;
    renderSessionsList(data.sessions || []);
  }

  var a = JSON.stringify(data.audit);
  if (a !== state.serialized.audit) {
    state.serialized.audit = a;
    renderActivity(data.audit || []);
  }

  if (typeof data.refreshedAt === 'number') {
    state.refreshedAt = data.refreshedAt;
  }
}

// ---------- cockpit: index freshness + live tick ----------
function renderFreshness() {
  var el = qs('freshness');
  if (!state.refreshedAt) { el.textContent = ''; return; }
  var secs = Math.max(0, Math.round((Date.now() - state.refreshedAt) / 1000));
  el.textContent = 'indexed ' + secs + 's ago';
}

function tickLiveLabel() {
  var label = qs('live-label');
  label.classList.add('tick');
  setTimeout(function () { label.classList.remove('tick'); }, 400);
}

fetchOverview();
setInterval(fetchOverview, 2500);
setInterval(renderFreshness, 1000);
fetchLinks(true);
setInterval(function () { fetchLinks(false); }, 60000);
</script>
</body>
</html>
