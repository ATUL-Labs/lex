<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#161618"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="520" rx="12" fill="url(#bg)"/>

  <text x="600" y="35" text-anchor="middle" font-size="16" fill="#f7f7f4" font-weight="bold" font-family="ui-sans-serif, system-ui, sans-serif">.lex/ folder structure</text>

  <rect x="40" y="60" width="280" height="200" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="180" y="85" text-anchor="middle" font-size="13" fill="#4F46E5" font-weight="bold">Agent (any IDE)</text>
  <text x="60" y="115" font-size="12" fill="#a0a0a0">Reads .lex/status.md</text>
  <text x="60" y="135" font-size="12" fill="#a0a0a0">Checks wip.md (crash recovery)</text>
  <text x="60" y="155" font-size="12" fill="#a0a0a0">Loads relevant knowledge pages</text>
  <text x="60" y="175" font-size="12" fill="#a0a0a0">Follows enforcement rules</text>
  <text x="60" y="195" font-size="12" fill="#a0a0a0">Uses lex search/symbols/links</text>
  <text x="60" y="215" font-size="12" fill="#a0a0a0">Writes via gateway (no approval)</text>
  <text x="60" y="240" font-size="11" fill="#4a4a4a">Claude · Cursor · Windsurf · Codex</text>

  <rect x="460" y="60" width="280" height="440" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="600" y="85" text-anchor="middle" font-size="13" fill="#4F46E5" font-weight="bold">.lex/</text>

  <rect x="480" y="100" width="240" height="28" rx="4" fill="#222226"/>
  <text x="490" y="118" font-size="11" fill="#e0e0e0">status.md</text>
  <text x="690" y="118" font-size="10" text-anchor="end" fill="#4a4a4a">current state</text>

  <rect x="480" y="135" width="240" height="28" rx="4" fill="#222226"/>
  <text x="490" y="153" font-size="11" fill="#e0e0e0">wip.md</text>
  <text x="690" y="153" font-size="10" text-anchor="end" fill="#28c840">active task</text>

  <rect x="480" y="170" width="240" height="28" rx="4" fill="#222226"/>
  <text x="490" y="188" font-size="11" fill="#e0e0e0">INDEX.md</text>
  <text x="690" y="188" font-size="10" text-anchor="end" fill="#4a4a4a">knowledge TOC</text>

  <rect x="480" y="205" width="240" height="28" rx="4" fill="#222226"/>
  <text x="490" y="223" font-size="11" fill="#e0e0e0">audit.log</text>
  <text x="690" y="223" font-size="10" text-anchor="end" fill="#4a4a4a">activity trail</text>

  <rect x="480" y="240" width="240" height="28" rx="4" fill="#222226"/>
  <text x="490" y="258" font-size="11" fill="#e0e0e0">index.db</text>
  <text x="690" y="258" font-size="10" text-anchor="end" fill="#4a4a4a">SQLite FTS5</text>

  <rect x="480" y="275" width="240" height="28" rx="4" fill="#222226"/>
  <text x="490" y="293" font-size="11" fill="#e0e0e0">devloop.json</text>
  <text x="690" y="293" font-size="10" text-anchor="end" fill="#4a4a4a">last test report</text>

  <rect x="480" y="315" width="240" height="180" rx="4" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="490" y="335" font-size="11" fill="#4F46E5" font-weight="bold">pages/</text>
  <text x="500" y="355" font-size="10" fill="#a0a0a0">stack.md       mistakes.md</text>
  <text x="500" y="372" font-size="10" fill="#a0a0a0">run.md         patterns.md</text>
  <text x="500" y="389" font-size="10" fill="#a0a0a0">design.md      rules.md</text>
  <text x="490" y="415" font-size="11" fill="#4F46E5" font-weight="bold">sessions/</text>
  <text x="500" y="435" font-size="10" fill="#a0a0a0">2026-07-21.md</text>
  <text x="500" y="452" font-size="10" fill="#a0a0a0">2026-07-20.md</text>
  <text x="490" y="478" font-size="11" fill="#4F46E5" font-weight="bold">in/</text>
  <text x="500" y="498" font-size="10" fill="#a0a0a0">gateway requests (auto-processed)</text>

  <rect x="880" y="60" width="280" height="200" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="1020" y="85" text-anchor="middle" font-size="13" fill="#4F46E5" font-weight="bold">lex-index (SQLite)</text>
  <text x="900" y="115" font-size="12" fill="#a0a0a0">lex search "auth" → 248 tokens</text>
  <text x="900" y="135" font-size="12" fill="#a0a0a0">lex symbols app.tsx → 40 rows</text>
  <text x="900" y="155" font-size="12" fill="#a0a0a0">lex links /api/users → consumers</text>
  <text x="900" y="175" font-size="12" fill="#a0a0a0">lex guard → secrets + anti-patterns</text>
  <text x="900" y="195" font-size="12" fill="#a0a0a0">lex devloop → all endpoints tested</text>
  <text x="900" y="215" font-size="12" fill="#a0a0a0">lex test → security scan</text>
  <text x="900" y="240" font-size="11" fill="#4a4a4a">Auto-maintained, zero token cost</text>

  <rect x="880" y="280" width="280" height="100" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="1020" y="305" text-anchor="middle" font-size="13" fill="#4F46E5" font-weight="bold">Viewer (lex serve)</text>
  <text x="900" y="330" font-size="12" fill="#a0a0a0">Live status · Schema ERD</text>
  <text x="900" y="350" font-size="12" fill="#a0a0a0">API tester · Dev loop</text>
  <text x="900" y="370" font-size="12" fill="#a0a0a0">localhost:4747</text>

  <rect x="880" y="400" width="280" height="100" rx="8" fill="#1a1a1e" stroke="#2a2a2e" stroke-width="1"/>
  <text x="1020" y="425" text-anchor="middle" font-size="13" fill="#4F46E5" font-weight="bold">Gateway</text>
  <text x="900" y="450" font-size="12" fill="#a0a0a0">write_to_file → .lex/in/</text>
  <text x="900" y="470" font-size="12" fill="#a0a0a0">30+ commands, zero approval</text>
  <text x="900" y="490" font-size="12" fill="#a0a0a0">Auto-injected as context</text>

  <line x1="320" y1="160" x2="460" y2="160" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="460,160 454,157 454,163" fill="#4F46E5"/>
  <text x="390" y="155" text-anchor="middle" font-size="10" fill="#4F46E5">reads/writes</text>

  <line x1="740" y1="160" x2="880" y2="160" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="880,160 874,157 874,163" fill="#4F46E5"/>
  <text x="810" y="155" text-anchor="middle" font-size="10" fill="#4F46E5">queries</text>

  <line x1="740" y1="330" x2="880" y2="330" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="880,330 874,327 874,333" fill="#4F46E5"/>
  <text x="810" y="325" text-anchor="middle" font-size="10" fill="#4F46E5">serves</text>

  <line x1="600" y1="500" x2="600" y2="500" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="740" y1="450" x2="880" y2="450" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="880,450 874,447 874,453" fill="#4F46E5"/>
  <text x="810" y="445" text-anchor="middle" font-size="10" fill="#4F46E5">via .lex/in/</text>
</svg>
