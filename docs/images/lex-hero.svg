<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#161618"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="3" rx="12" fill="url(#accent)"/>

  <circle cx="24" cy="24" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="24" r="6" fill="#febc2e"/>
  <circle cx="64" cy="24" r="6" fill="#28c840"/>

  <text x="40" y="80" font-size="15" fill="#4F46E5" font-weight="bold">$ lex init</text>
  <text x="40" y="105" font-size="13" fill="#6a6a6a">  ✓ .lex/ created</text>
  <text x="40" y="125" font-size="13" fill="#6a6a6a">  ✓ Stack detected: TypeScript + React</text>
  <text x="40" y="145" font-size="13" fill="#6a6a6a">  ✓ 16 skills loaded</text>

  <text x="40" y="185" font-size="15" fill="#4F46E5" font-weight="bold">$ lex search "auth middleware"</text>
  <text x="40" y="210" font-size="13" fill="#e0e0e0">  src/middleware/auth.ts:42   function validateToken()</text>
  <text x="40" y="230" font-size="13" fill="#e0e0e0">  src/routes/api.ts:18        router.use('/api', authMiddleware)</text>
  <text x="40" y="250" font-size="13" fill="#e0e0e0">  tests/auth.test.ts:88       test('rejects expired tokens')</text>
  <text x="40" y="275" font-size="12" fill="#4a4a4a">  3 files, ~412 tokens. grep would return ~12,400.</text>

  <text x="40" y="315" font-size="15" fill="#4F46E5" font-weight="bold">$ lex devloop</text>
  <text x="40" y="340" font-size="13" fill="#6a6a6a">  100 endpoints: 5 OK, 55 require auth, 38 not found, 0 errors</text>
  <text x="40" y="360" font-size="13" fill="#28c840">  ✓ No actionable errors</text>

  <text x="700" y="80" font-size="28" fill="#f7f7f4" font-weight="bold" font-family="ui-sans-serif, system-ui, sans-serif">lex</text>
  <text x="700" y="115" font-size="18" fill="#a0a0a0" font-family="ui-sans-serif, system-ui, sans-serif">The shared brain for</text>
  <text x="700" y="140" font-size="18" fill="#a0a0a0" font-family="ui-sans-serif, system-ui, sans-serif">AI coding agents.</text>

  <rect x="700" y="165" width="460" height="1" fill="#2a2a2e"/>

  <text x="700" y="195" font-size="13" fill="#6a6a6a" font-family="ui-sans-serif, system-ui, sans-serif">Cross-agent memory · Enforcement rules</text>
  <text x="700" y="215" font-size="13" fill="#6a6a6a" font-family="ui-sans-serif, system-ui, sans-serif">Live viewer · 16 reasoning skills</text>
  <text x="700" y="235" font-size="13" fill="#6a6a6a" font-family="ui-sans-serif, system-ui, sans-serif">Zero dependencies · 9+ platforms</text>

  <rect x="700" y="260" width="460" height="1" fill="#2a2a2e"/>

  <text x="700" y="290" font-size="12" fill="#4F46E5" font-family="ui-sans-serif, system-ui, sans-serif">Claude Code · Cursor · Windsurf · Codex</text>
  <text x="700" y="310" font-size="12" fill="#4F46E5" font-family="ui-sans-serif, system-ui, sans-serif">Gemini · Copilot · Antigravity · Kimi</text>
</svg>
